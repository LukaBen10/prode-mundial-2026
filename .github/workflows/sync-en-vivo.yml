name: Sync resultados en vivo

# Sincroniza los resultados del prode cada 5 minutos (más "en vivo" que los crons de Vercel).
# Requiere el secret CRON_SECRET configurado en el repo (Settings → Secrets and variables → Actions).
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Disparar sync de resultados
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" "https://prodedonut.com.ar/api/cron/resultados?secret=${{ secrets.CRON_SECRET }}")
          echo "Sync resultados → HTTP $code"
